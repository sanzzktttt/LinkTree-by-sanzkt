<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Ihsann | Links</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --pink:         #ff4d88;
  --pink-dark:    #e6006e;
  --pink-mid:     #ff80ab;
  --pink-light:   #ffc0d9;
  --bg-from:      #ffe0ec;
  --bg-mid:       #ffcce0;
  --bg-to:        #ffb3cc;
  --white:        #ffffff;
  --text:         #3a1a2a;
  --subtext:      #9e5070;
  --glass:        rgba(255,255,255,0.58);
  --glass-border: rgba(255,255,255,0.85);
  --shadow:       rgba(255,77,136,0.22);

  /* base (mobile) */
  --avatar-size:   108px;
  --avatar-font:   46px;
  --name-size:     34px;
  --handle-size:   14px;
  --bio-size:      14px;
  --links-width:   460px;
  --btn-pad:       15px 20px;
  --icon-size:     42px;
  --icon-font:     21px;
  --label-size:    15px;
  --desc-size:     12px;
  --gap:           14px;
  --pv:            52px;
  --ph:            20px;
  --copy-size:     12.5px;
}

/* tablet */
@media (min-width: 600px) {
  :root {
    --avatar-size:  124px;
    --avatar-font:  52px;
    --name-size:    40px;
    --handle-size:  16px;
    --bio-size:     15px;
    --links-width:  520px;
    --btn-pad:      17px 24px;
    --icon-size:    48px;
    --icon-font:    24px;
    --label-size:   16px;
    --desc-size:    13px;
    --gap:          18px;
    --pv:           64px;
    --ph:           40px;
    --copy-size:    13.5px;
  }
}

/* laptop */
@media (min-width: 1024px) {
  :root {
    --avatar-size:  140px;
    --avatar-font:  60px;
    --name-size:    46px;
    --handle-size:  17px;
    --bio-size:     16px;
    --links-width:  560px;
    --btn-pad:      19px 28px;
    --icon-size:    52px;
    --icon-font:    26px;
    --label-size:   17px;
    --desc-size:    13.5px;
    --gap:          20px;
    --pv:           80px;
    --ph:           60px;
    --copy-size:    14px;
  }
}

/* wide desktop */
@media (min-width: 1440px) {
  :root {
    --avatar-size: 152px;
    --avatar-font: 65px;
    --name-size:   50px;
    --links-width: 600px;
  }
}

/* tiny phones */
@media (max-width: 359px) {
  :root {
    --avatar-size: 90px;
    --avatar-font: 38px;
    --name-size:   26px;
    --gap:         11px;
    --btn-pad:     13px 15px;
    --icon-size:   36px;
    --icon-font:   18px;
    --label-size:  14px;
    --desc-size:   11px;
    --ph:          14px;
  }
}

/* ── HTML / BODY ── */
html { height: 100%; scroll-behavior: smooth; }

body {
  min-height: 100%;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(255,200,220,0.65) 0%, transparent 60%),
    radial-gradient(ellipse 65% 55% at 82% 92%, rgba(255,155,190,0.55) 0%, transparent 55%),
    linear-gradient(160deg, var(--bg-from) 0%, var(--bg-mid) 50%, var(--bg-to) 100%);
  background-attachment: fixed;
  font-family: 'Nunito', sans-serif;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── FLOATING HEARTS ── */
.hearts-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.hrt {
  position: absolute;
  bottom: -80px;
  opacity: 0;
  will-change: transform, opacity;
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  0%   { transform: translateY(0)       rotate(-15deg) scale(0.8);  opacity: 0;   }
  8%   {                                                             opacity: 0.5; }
  90%  {                                                             opacity: 0.18;}
  100% { transform: translateY(-114vh)  rotate(22deg)  scale(1.15); opacity: 0;   }
}

/* ── PAGE WRAPPER ── */
.page {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: var(--pv) var(--ph);
  padding-top:    max(var(--pv), env(safe-area-inset-top,    0px));
  padding-bottom: max(var(--pv), env(safe-area-inset-bottom, 0px));
}

/* ── AVATAR ── */
.avatar-wrap {
  position: relative;
  width:  var(--avatar-size);
  height: var(--avatar-size);
  margin-bottom: 18px;
  flex-shrink: 0;
  animation: popIn 0.7s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes popIn {
  from { transform: scale(0); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
.avatar-ring {
  position: absolute;
  inset: -5px;
  border-radius: 50%;
  background: conic-gradient(var(--pink), var(--pink-mid), var(--pink-light), #fff, var(--pink));
  animation: spinRing 5s linear infinite;
}
@keyframes spinRing { to { transform: rotate(360deg); } }
.avatar-inner {
  position: relative;
  width:  var(--avatar-size);
  height: var(--avatar-size);
  border-radius: 50%;
  background: linear-gradient(145deg, #ff9ec0, var(--pink), var(--pink-dark));
  border: 4px solid var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Dancing Script', cursive;
  font-size: var(--avatar-font);
  color: var(--white);
  z-index: 1;
  box-shadow: 0 10px 32px var(--shadow), 0 2px 8px rgba(0,0,0,0.08);
  user-select: none;
}

/* ── TEXT ── */
@keyframes fadeUp {
  from { transform: translateY(18px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
.name {
  font-family: 'Dancing Script', cursive;
  font-size: var(--name-size);
  color: var(--pink-dark);
  text-align: center;
  line-height: 1.15;
  text-shadow: 0 3px 16px rgba(230,0,110,0.18);
  animation: fadeUp 0.55s 0.15s ease both;
}
.handle {
  font-size: var(--handle-size);
  color: var(--subtext);
  font-weight: 700;
  margin-top: 4px;
  margin-bottom: 10px;
  letter-spacing: 0.6px;
  animation: fadeUp 0.55s 0.25s ease both;
}
.bio {
  font-size: var(--bio-size);
  color: var(--subtext);
  text-align: center;
  max-width: min(320px, 80vw);
  line-height: 1.65;
  margin-bottom: 32px;
  font-weight: 600;
  animation: fadeUp 0.55s 0.35s ease both;
}

/* ── LINKS ── */
.links {
  width: 100%;
  max-width: var(--links-width);
  display: flex;
  flex-direction: column;
  gap: var(--gap);
}

.link-btn {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: var(--btn-pad);
  border-radius: 20px;
  background: var(--glass);
  border: 1.5px solid var(--glass-border);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  text-decoration: none;
  color: var(--text);
  font-weight: 700;
  box-shadow: 0 5px 22px var(--shadow), 0 1px 4px rgba(0,0,0,0.05);
  transition:
    transform  0.22s cubic-bezier(.34,1.56,.64,1),
    box-shadow 0.22s ease,
    background 0.22s ease;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  opacity: 0;
  animation: fadeUp 0.55s ease forwards;
  -webkit-user-select: none;
  user-select: none;
}
.link-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(130deg, rgba(255,255,255,0.65) 0%, rgba(255,255,255,0) 55%);
  pointer-events: none;
  border-radius: inherit;
}
@media (hover: hover) {
  .link-btn:hover {
    transform: translateY(-4px) scale(1.02);
    box-shadow: 0 14px 38px var(--shadow), 0 4px 10px rgba(0,0,0,0.07);
    background: rgba(255,255,255,0.78);
  }
  .link-btn:hover .link-icon  { transform: rotate(-6deg) scale(1.1); }
  .link-btn:hover .link-arrow { transform: translateX(4px); opacity: 1; }
}
.link-btn:active {
  transform: scale(0.96);
  box-shadow: 0 3px 10px var(--shadow);
}

.link-icon {
  width:  var(--icon-size);
  height: var(--icon-size);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--icon-font);
  flex-shrink: 0;
  box-shadow: 0 3px 10px rgba(0,0,0,0.14);
  transition: transform 0.2s ease;
}
.link-text {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}
.link-label {
  font-size: var(--label-size);
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.link-desc {
  font-size: var(--desc-size);
  color: var(--subtext);
  font-weight: 600;
  line-height: 1.3;
}
.link-arrow {
  font-size: 22px;
  color: var(--pink-mid);
  opacity: 0.75;
  transition: transform 0.2s ease, opacity 0.2s;
  flex-shrink: 0;
}

/* icon gradients */
.ic-wa     { background: linear-gradient(135deg, #25d366, #128c7e); }
.ic-ig     { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
.ic-tiktok { background: linear-gradient(135deg, #111, #69c9d0); }
.ic-yt     { background: linear-gradient(135deg, #ff2020, #cc0000); }
.ic-fb     { background: linear-gradient(135deg, #1877f2, #0a5dc2); }
.ic-email  { background: linear-gradient(135deg, #ea4335, #c5221f); }
.ic-gift    { background: linear-gradient(135deg, var(--pink), var(--pink-dark)); }
.ic-discord { background: linear-gradient(135deg, #5865f2, #404eed); }
.ic-github  { background: linear-gradient(135deg, #24292e, #57606a); }

/* stagger */
.link-btn:nth-child(1) { animation-delay: 0.44s; }
.link-btn:nth-child(2) { animation-delay: 0.56s; }
.link-btn:nth-child(3) { animation-delay: 0.68s; }
.link-btn:nth-child(4) { animation-delay: 0.80s; }
.link-btn:nth-child(5) { animation-delay: 0.92s; }
.link-btn:nth-child(6) { animation-delay: 1.04s; }
.link-btn:nth-child(7) { animation-delay: 1.16s; }

/* ── DIVIDER ── */
.divider {
  width: 100%;
  max-width: var(--links-width);
  display: flex;
  align-items: center;
  gap: 14px;
  margin: 4px 0;
  opacity: 0;
  animation: fadeUp 0.5s 1.04s ease forwards;
}
.divider-line { flex: 1; height: 1px; background: linear-gradient(90deg,transparent,var(--pink-light),transparent); }
.divider-text { font-size: 11px; color: var(--pink-mid); font-weight: 800; letter-spacing: 2px; text-transform: uppercase; white-space: nowrap; }

/* ── COPYRIGHT ── */
.copyright {
  margin-top: 44px;
  margin-bottom: 10px;
  text-align: center;
  font-size: var(--copy-size);
  color: var(--subtext);
  font-weight: 600;
  line-height: 1.8;
  opacity: 0;
  animation: fadeUp 0.5s 1.28s ease forwards;
}
.copyright .heart {
  color: var(--pink);
  display: inline-block;
  animation: heartbeat 1.4s ease-in-out infinite;
}
@keyframes heartbeat {
  0%,100% { transform: scale(1);    }
  14%     { transform: scale(1.28); }
  28%     { transform: scale(1);    }
  42%     { transform: scale(1.15); }
  56%     { transform: scale(1);    }
}
.copyright strong { color: var(--pink-dark); }

/* ── RIPPLE ── */
@keyframes rippleAnim {
  to { transform: translate(-50%,-50%) scale(32); opacity: 0; }
}
</style>
</head>
<body>

<div class="hearts-bg" id="heartsBg"></div>

</div>

<script>
/* Floating hearts — count scales with screen width */
(function () {
  const bg = document.getElementById('heartsBg');
  const emojis = ['🩷','💕','💖','💗','✨','🌸','💓','🌺','💝','🎀'];
  const w = window.innerWidth;
  const count = w >= 1024 ? 28 : w >= 600 ? 20 : 14;
  for (let i = 0; i < count; i++) {
    const h = document.createElement('div');
    h.className = 'hrt';
    h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    h.style.left      = (Math.random() * 100) + '%';
    h.style.fontSize  = (10 + Math.random() * 18) + 'px';
    const dur   = 8  + Math.random() * 10;
    const delay = Math.random() * 14;
    h.style.animation = `floatUp ${dur}s ${delay}s linear infinite`;
    bg.appendChild(h);
  }
})();

/* Ripple */
document.querySelectorAll('.link-btn').forEach(btn => {
  function spawnRipple(cx, cy) {
    const rect   = btn.getBoundingClientRect();
    const r      = document.createElement('span');
    r.style.cssText = [
      'position:absolute','width:8px','height:8px',
      'border-radius:50%','background:rgba(255,77,136,0.28)',
      `left:${cx - rect.left}px`,`top:${cy - rect.top}px`,
      'transform:translate(-50%,-50%) scale(0)',
      'animation:rippleAnim 0.55s ease forwards',
      'pointer-events:none'
    ].join(';');
    btn.appendChild(r);
    setTimeout(() => r.remove(), 600);
  }
  btn.addEventListener('click',      e => spawnRipple(e.clientX, e.clientY));
  btn.addEventListener('touchstart', e => {
    const t = e.touches[0];
    spawnRipple(t.clientX, t.clientY);
  }, { passive: true });
});
</script>
